<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Jacobo Studios</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f0f0f;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#1b1b1b;
}

nav h1{
font-size:22px;
}

.menu a{
margin:0 15px;
text-decoration:none;
color:white;
font-size:16px;
cursor:pointer;
}

.download{
background:#3fbf7f;
padding:10px 20px;
border-radius:20px;
text-decoration:none;
color:white;
font-weight:bold;
}

.hero{
height:60vh;
background-image: url("data:image/png;base64,AQUIVAELCODIGOBASE64");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h2{
font-size:60px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
width:70%;
color:#ddd;
}

.tabs{
display:flex;
justify-content:center;
background:#181818;
}

.tab{
padding:15px 40px;
cursor:pointer;
}

.tab:hover{
background:#333;
}

.content{
display:none;
padding:60px;
text-align:center;
}

.active{
display:block;
}

h3{
font-size:35px;
margin-bottom:10px;
}

.pronto{
color:gray;
font-size:20px;
}

</style>
</head>

<body>

<nav>

<h1>Jacobo Studios</h1>

<div class="menu">
<a onclick="showTab('descargas')">Descargas</a>
<a onclick="showTab('anuncios')">Anuncios</a>
<a onclick="showTab('eventos')">Eventos</a>
</div>

<a class="download">Descargar</a>

</nav>

<section class="hero">

<h2>Jacobo Studios</h2>

<p>
Hola, somos un estudio dedicado a eventos grandes para los jugadores
que quieran vivir una experiencia única.
</p>

</section>

<div class="tabs">
<div class="tab" onclick="showTab('descargas')">Descargas</div>
<div class="tab" onclick="showTab('anuncios')">Anuncios</div>
<div class="tab" onclick="showTab('eventos')">Eventos</div>
</div>

<div id="descargas" class="content active">
<h3>Descargas</h3>
<p class="pronto">Pronto</p>
</div>

<div id="anuncios" class="content">
<h3>Anuncios</h3>
<p class="pronto">Pronto</p>
</div>

<div id="eventos" class="content">
<h3>Eventos</h3>
<p class="pronto">Pronto</p>
</div>

<script>

function showTab(tab){

let sections=document.querySelectorAll(".content")

sections.forEach(s=>{
s.classList.remove("active")
})

document.getElementById(tab).classList.add("active")

}

</script>

</body>
</html>
